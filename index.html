<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Biblia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a7043">
</head>
<body>
    <header>
        <div class="header-main">
            <h1>MdJ Biblia App</h1>
            
            <div class="toolbar">
                <select id="libroSelect" class="compact-select"></select>
                <select id="capituloSelect" class="compact-select"></select>
                <button id="btnAnterior" class="nav-btn">◀</button>
                <button id="btnSiguiente" class="nav-btn">▶</button>
                <button id="btnMenu" class="menu-btn">☰</button>
            </div>
        </div>
    </header>

    <!-- Menú Desplegable -->
    <div id="menuAcciones" class="menu-desplegable">
        <button id="btnBuscarFull">🔍 Búsqueda</button>
        <button id="btnModoOscuro">🌙 Modo Oscuro</button>
        <button id="btnFuenteMenos">A- Disminuir letra</button>
        <button id="btnFuenteMas">A+ Aumentar letra</button>
    </div>

    <main>
        <div id="textoBiblia" class="biblia-texto"></div>
    </main>

   <!-- Cambia la línea del script por esto para asegurar que el hardware esté listo -->
        <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('Service Worker registrado con éxito:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Error al registrar Service Worker:', error);
                    });
            });
        }
    </script>
<script src="script.js" defer></script>
</body>
</html>
